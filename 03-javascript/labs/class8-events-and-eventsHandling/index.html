<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <container class="bookMyShow">
      <select
        name="bookMyShow-select"
        id="bookMyShow-select-id"
        aria-label="Book My Show category"
      >
        <option value="none">All Movies</option>
        <option value="action">Action</option>
        <option value="romance">Romantic</option>
        <option value="comedy">Comedy</option>
      </select>
      <div class="movie-container">
        <div class="movies" data-category="action">
          <h3 class="heading">Action-1</h3>
          <p class="price">100/-</p>
        </div>
        <div class="movies" data-category="action">
          <h3 class="heading">Action-2</h3>
          <p class="price">100/-</p>
        </div>
        <div class="movies" data-category="romance">
          <h3 class="heading">Romance-1</h3>
          <p class="price">100/-</p>
        </div>
        <div class="movies" data-category="romance">
          <h3 class="heading">Romance-2</h3>
          <p class="price">100/-</p>
        </div>
        <div class="movies" data-category="comedy">
          <h3 class="heading">Comedy-2</h3>
          <p class="price">100/-</p>
        </div>
        <div class="movies" data-category="comedy">
          <h3 class="heading">Comedy-2</h3>
          <p class="price">100/-</p>
        </div>
      </div>
    </container>
    <script src="./index.js"></script>
  </body>
</html>

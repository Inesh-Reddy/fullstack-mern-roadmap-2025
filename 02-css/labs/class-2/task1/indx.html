<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
      }
      .card {
        width: 250px;
        background-color: white;
        border: 2px solid gray;
        padding: 20px;
        margin: 50px auto;
        text-align: center;
      }
      .card img {
        width: 80%;
        margin: 15px 0;
      }
      .card h2 {
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <img src="./assets/images/person-sharp.svg" alt="profile image" />
        <h2>John Doe</h2>
        <p>Web Developer</p>
      </div>
    </div>
  </body>
</html>
